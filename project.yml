name: CatermMobile
options:
  bundleIdPrefix: app.caterm
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Caterm:
    path: .
  swift-collections:
    url: https://github.com/apple/swift-collections.git
    from: "1.1.0"
  swift-atomics:
    url: https://github.com/apple/swift-atomics.git
    from: "1.2.0"

targets:
  CatermMobileApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/iOS
    dependencies:
      - package: Caterm
        product: CatermMobile
      # swift-nio pulls these transitively; Xcode 26.5's -target build
      # does not wire transitive SwiftPM module search paths, so depend on
      # them explicitly to expose DequeModule / Atomics.
      - package: swift-collections
        product: DequeModule
      - package: swift-atomics
        product: Atomics
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.caterm.mobile
        PRODUCT_NAME: Caterm
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: App/iOS/Info.plist
