name: caterm-compose

services:
  postgres:
    image: postgres:15
    container_name: caterm-postgres
    environment:
      POSTGRES_DB: caterm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - caterm-postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  caterm-postgres_data:
